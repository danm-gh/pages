function CyberInfraMap() {
  // Parse initial state from URL hash
  const parseHash = () => {
    const h = window.location.hash.slice(1);
    const params = new URLSearchParams(h);
    return { cat: params.get("cat"), zone: params.get("zone"), search: params.get("q") || "" };
  };
  const initial = parseHash();

  const [active, setActive] = useState(initial.cat && allItems.find(i=>i.id===initial.cat) ? initial.cat : null);
  const [activeZone, setActiveZone] = useState(initial.zone && zones[initial.zone] ? initial.zone : null);
  const [locked, setLocked] = useState(!!(initial.cat || initial.zone));
  const [lockType, setLockType] = useState(initial.cat ? "cat" : initial.zone ? "zone" : null);
  const [search, setSearch] = useState(initial.search);
  const [hoverItem, setHoverItem] = useState(null);
  const [linkCopied, setLinkCopied] = useState(false);
  const itemRefs = useRef({});

  // Update URL hash when locked state changes
  useEffect(() => {
    try {
      if (locked && lockType === "cat" && active) {
        window.history.replaceState(null, "", `#cat=${active}`);
      } else if (locked && lockType === "zone" && activeZone) {
        window.history.replaceState(null, "", `#zone=${activeZone}`);
      } else if (search) {
        window.history.replaceState(null, "", `#q=${encodeURIComponent(search)}`);
      } else {
        window.history.replaceState(null, "", window.location.pathname || "#");
      }
    } catch(e) { /* sandboxed iframe */ }
  }, [active, activeZone, locked, lockType, search]);

  const copyLink = useCallback(() => {
    let hash = "";
    if (locked && lockType === "cat" && active) hash = `#cat=${active}`;
    else if (locked && lockType === "zone" && activeZone) hash = `#zone=${activeZone}`;
    else if (search) hash = `#q=${encodeURIComponent(search)}`;
    const url = window.location.href.split("#")[0] + hash;
    const el = document.createElement("textarea");
    el.value = url;
    el.style.position = "fixed";
    el.style.opacity = "0";
    document.body.appendChild(el);
    el.select();
    document.execCommand("copy");
    document.body.removeChild(el);
    setLinkCopied(true);
    setTimeout(() => setLinkCopied(false), 2000);
  }, [locked, lockType, active, activeZone, search]);
  
  useEffect(() => {
    if (active && itemRefs.current[active]) {
      itemRefs.current[active].scrollIntoView({ behavior: "smooth", block: "nearest" });
    }
  }, [active]);

  // Share popover state — hover triggered, stays open while mouse is over trigger or popover
  const [sharePop, setSharePop] = useState(null); // {x, y, product}
  const sharePopRef = useRef(null);
  const shareHideTimer = useRef(null);

  const showSharePop = useCallback((e, p) => {
    clearTimeout(shareHideTimer.current);
    const rect = e.target.getBoundingClientRect();
    setSharePop({ x: rect.left, y: rect.bottom + 4, product: p });
  }, []);

  const startHideSharePop = useCallback(() => {
    shareHideTimer.current = setTimeout(() => setSharePop(null), 200);
  }, []);

  const cancelHideSharePop = useCallback(() => {
    clearTimeout(shareHideTimer.current);
  }, []);

  // Highlight matching text in search results
  const hl = useCallback((text, query) => {
    if (!query || !text) return text;
    const idx = text.toLowerCase().indexOf(query.toLowerCase());
    if (idx === -1) return text;
    return <>{text.slice(0, idx)}<mark style={{background:"#f59e0b",color:"#1e1e1e",borderRadius:2,padding:"0 1px"}}>{text.slice(idx, idx + query.length)}</mark>{text.slice(idx + query.length)}</>;
  }, []);

  const hlJoin = useCallback((arr, query) => {
    if (!arr || arr.length === 0) return null;
    return arr.map((item, i) => <span key={i}>{i > 0 ? " · " : ""}{hl(item, query)}</span>);
  }, [hl]);

  const highlightedZones = active ? (allItems.find(i=>i.id===active)?.zones||[]) : activeZone ? [activeZone] : [];
  const highlightedCats = activeZone ? getItemsForZone(activeZone).map(i=>i.id) : active ? [active] : [];
  const handleCatHover = useCallback(id => { setHoverItem(id); if (!locked){setActive(id);setActiveZone(null);} }, [locked]);
  const handleCatLeave = useCallback(() => { setHoverItem(null); if (!locked) setActive(null); }, [locked]);
  const handleCatClick = useCallback(id => {
    if (active === id && locked && lockType === "cat") { setLocked(false); setLockType(null); setActive(null); }

            <text x="504" y="873" fill="#99f6e4" fontSize="7">Auto-fix — API reconfig, PR, patch</text>
          </g>

          {/* === GOVERNANCE & COMPLIANCE === */}
          <g opacity={zo(["govern"])} style={{transition:"opacity .3s"}}>
            <TelArrow x={200} y1={878} y2={900} color="#9333ea"/>
            <TelArrow x={620} y1={878} y2={900} color="#9333ea"/>

            <rect x="30" y="905" width="742" height="85" rx="6" fill="#0f1117" stroke="#9333ea" strokeWidth="2"/>
            <text x="48" y="924" fill="#c084fc" fontSize="12" fontWeight="700" letterSpacing="0.5">GOVERNANCE & COMPLIANCE</text>
            <text x="48" y="938" fill="#9333ea" fontSize="9">"Are we meeting our obligations?" — strategic oversight, not operational</text>

            <rect x="48" y="950" width="105" height="22" rx="4" fill="#3b0764" stroke="#9333ea" strokeWidth="1.5"/><text x="100" y="965" textAnchor="middle" fill="#d8b4fe" fontSize="10" fontWeight="500">GRC</text>
            <rect x="163" y="950" width="75" height="22" rx="4" fill="#3b0764" stroke="#9333ea" strokeWidth="1.5"/><text x="200" y="965" textAnchor="middle" fill="#d8b4fe" fontSize="10" fontWeight="500">CCM</text>
            <rect x="248" y="950" width="75" height="22" rx="4" fill="#3b0764" stroke="#9333ea" strokeWidth="1.5"/><text x="285" y="965" textAnchor="middle" fill="#d8b4fe" fontSize="10" fontWeight="500">TPRM</text>
            <rect x="333" y="950" width="75" height="22" rx="4" fill="#3b0764" stroke="#9333ea" strokeWidth="1.5"/><text x="370" y="965" textAnchor="middle" fill="#d8b4fe" fontSize="10" fontWeight="500">SCM</text>
            <rect x="418" y="950" width="75" height="22" rx="4" fill="#3b0764" stroke="#9333ea" strokeWidth="1.5"/><text x="455" y="965" textAnchor="middle" fill="#d8b4fe" fontSize="10" fontWeight="500">SSPM</text>

            <text x="520" y="956" fill="#a855f7" fontSize="8">Incidents · Posture · Evidence</text>
            <text x="520" y="968" fill="#a855f7" fontSize="8">Remediation SLAs · Risk registers</text>
            <text x="520" y="980" fill="#a855f7" fontSize="8">Board reporting · Vendor risk</text>
          </g>

          {/* Feed labels */}
          <g opacity={Math.max(zo(["detect"]),zo(["govern"]))} style={{transition:"opacity .3s"}}>
            <text x="120" y="895" fill="#c084fc" fontSize="8">incidents · breach notif.</text>
          </g>
          <g opacity={Math.max(zo(["expose"]),zo(["govern"]))} style={{transition:"opacity .3s"}}>
            <text x="550" y="895" fill="#c084fc" fontSize="8">posture · evidence · SLAs</text>
          </g>

          {/* LEGEND */}
          <g opacity={dimmed ? 0.3 : 0.85} style={{transition:"opacity .3s"}}>
            <text x="30" y="1010" fill="#94a3b8" fontSize="10" fontWeight="700" letterSpacing="0.5">CONNECTIONS</text>

            <line x1="30" y1="1025" x2="60" y2="1025" stroke="#64748b" strokeWidth="1.5"/>
            <text x="68" y="1029" fill="#94a3b8" fontSize="9">Internal network link</text>

            <line x1="210" y1="1025" x2="240" y2="1025" stroke="#64748b" strokeWidth="1.5" strokeDasharray="5,4"/>
            <text x="248" y="1029" fill="#94a3b8" fontSize="9">Logical / cross-zone</text>

            <line x1="390" y1="1025" x2="420" y2="1025" stroke="#0891b2" strokeWidth="1.5" strokeDasharray="5,4"/>
            <text x="428" y="1029" fill="#67e8f9" fontSize="9">VPN / SASE tunnel</text>

            <line x1="570" y1="1025" x2="600" y2="1025" stroke="#16a34a" strokeWidth="1.5" strokeDasharray="5,4"/>
            <text x="608" y="1029" fill="#4ade80" fontSize="9">CI/CD deploy</text>

            <line x1="30" y1="1043" x2="60" y2="1043" stroke="#7c3aed" strokeWidth="1.5" strokeDasharray="5,4"/>
            <text x="68" y="1047" fill="#a78bfa" fontSize="9">DC ↔ Cloud (hybrid / repl)</text>

            <line x1="270" y1="1043" x2="300" y2="1043" stroke="#9333ea" strokeWidth="1.5" strokeDasharray="4,3"/>
            <polygon points="300,1040 300,1046 307,1043" fill="#9333ea"/>
            <text x="315" y="1047" fill="#c084fc" fontSize="9">Feeds governance</text>

            <line x1="480" y1="1043" x2="510" y2="1043" stroke="#7c3aed" strokeWidth="1.5" strokeDasharray="4,3"/>
            <text x="518" y="1047" fill="#a78bfa" fontSize="9">TIP (external intel)</text>

            <line x1="660" y1="1043" x2="692" y2="1043" stroke="#f59e0b" strokeWidth="2.5"/>
            <polygon points="692,1040 692,1046 699,1043" fill="#f59e0b"/>
            <text x="706" y="1047" fill="#fbbf24" fontSize="9">Feedback loop</text>
          </g>

          {/* Hitboxes - rendered last */}
          {Object.keys(zones).map(z=><ZoneHitbox key={z} zone={z} onEnter={handleZoneHover} onLeave={handleZoneLeave} onClick={handleZoneClick}/>)}

          {/* Category hitboxes — on top of zone hitboxes so they intercept clicks */}
          {/* Detection pipeline */}
          <rect x="48" y="760" width="110" height="22" rx="4" fill="transparent" style={{cursor:"pointer"}} onClick={(e)=>{e.stopPropagation();handleCatClick("siem")}} onMouseEnter={(e)=>{e.stopPropagation();handleCatHover("siem")}} onMouseLeave={(e)=>{e.stopPropagation();handleCatLeave()}}/>
          <rect x="185" y="760" width="110" height="22" rx="4" fill="transparent" style={{cursor:"pointer"}} onClick={(e)=>{e.stopPropagation();handleCatClick("xdr")}} onMouseEnter={(e)=>{e.stopPropagation();handleCatHover("xdr")}} onMouseLeave={(e)=>{e.stopPropagation();handleCatLeave()}}/>
          <rect x="305" y="760" width="56" height="22" rx="4" fill="transparent" style={{cursor:"pointer"}} onClick={(e)=>{e.stopPropagation();handleCatClick("mdr")}} onMouseEnter={(e)=>{e.stopPropagation();handleCatHover("mdr")}} onMouseLeave={(e)=>{e.stopPropagation();handleCatLeave()}}/>
          <rect x="100" y="796" width="145" height="22" rx="4" fill="transparent" style={{cursor:"pointer"}} onClick={(e)=>{e.stopPropagation();handleCatClick("soar")}} onMouseEnter={(e)=>{e.stopPropagation();handleCatHover("soar")}} onMouseLeave={(e)=>{e.stopPropagation();handleCatLeave()}}/>
          {/* Exposure pipeline */}
          <rect x="480" y="760" width="140" height="22" rx="4" fill="transparent" style={{cursor:"pointer"}} onClick={(e)=>{e.stopPropagation();handleCatClick("ctem")}} onMouseEnter={(e)=>{e.stopPropagation();handleCatHover("ctem")}} onMouseLeave={(e)=>{e.stopPropagation();handleCatLeave()}}/>
          <rect x="620" y="760" width="136" height="22" rx="4" fill="transparent" style={{cursor:"pointer"}} onClick={(e)=>{e.stopPropagation();handleCatClick("vpt")}} onMouseEnter={(e)=>{e.stopPropagation();handleCatHover("vpt")}} onMouseLeave={(e)=>{e.stopPropagation();handleCatLeave()}}/>
          <rect x="480" y="808" width="276" height="69" rx="3" fill="transparent" style={{cursor:"pointer"}} onClick={(e)=>{e.stopPropagation();handleCatClick("remediation")}} onMouseEnter={(e)=>{e.stopPropagation();handleCatHover("remediation")}} onMouseLeave={(e)=>{e.stopPropagation();handleCatLeave()}}/>
          {/* Governance */}
          <rect x="48" y="950" width="105" height="22" rx="4" fill="transparent" style={{cursor:"pointer"}} onClick={(e)=>{e.stopPropagation();handleCatClick("grc")}} onMouseEnter={(e)=>{e.stopPropagation();handleCatHover("grc")}} onMouseLeave={(e)=>{e.stopPropagation();handleCatLeave()}}/>
          <rect x="163" y="950" width="75" height="22" rx="4" fill="transparent" style={{cursor:"pointer"}} onClick={(e)=>{e.stopPropagation();handleCatClick("compliance")}} onMouseEnter={(e)=>{e.stopPropagation();handleCatHover("compliance")}} onMouseLeave={(e)=>{e.stopPropagation();handleCatLeave()}}/>
          <rect x="248" y="950" width="75" height="22" rx="4" fill="transparent" style={{cursor:"pointer"}} onClick={(e)=>{e.stopPropagation();handleCatClick("tprm")}} onMouseEnter={(e)=>{e.stopPropagation();handleCatHover("tprm")}} onMouseLeave={(e)=>{e.stopPropagation();handleCatLeave()}}/>
          <rect x="333" y="950" width="75" height="22" rx="4" fill="transparent" style={{cursor:"pointer"}} onClick={(e)=>{e.stopPropagation();handleCatClick("scm")}} onMouseEnter={(e)=>{e.stopPropagation();handleCatHover("scm")}} onMouseLeave={(e)=>{e.stopPropagation();handleCatLeave()}}/>
          <rect x="418" y="950" width="75" height="22" rx="4" fill="transparent" style={{cursor:"pointer"}} onClick={(e)=>{e.stopPropagation();handleCatClick("sspm")}} onMouseEnter={(e)=>{e.stopPropagation();handleCatHover("sspm")}} onMouseLeave={(e)=>{e.stopPropagation();handleCatLeave()}}/>
        </svg>
      </div>

      {/* SIDEBAR */}
      <div style={{width:310,minWidth:310,borderLeft:"1px solid #1e293b",overflowY:"auto",background:"#0a0c10",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"10px 14px 8px",borderBottom:"1px solid #1e293b"}}>
          <div style={{fontSize:14,fontWeight:700,color:"#e2e8f0"}}>{(locked && lockType==="cat") ? "Security Categories" : activeZone ? zones[activeZone].label : "Security Categories"}</div>
          <div style={{fontSize:10,color:"#64748b",marginTop:2}}>
            {(locked && lockType==="cat") ? "Click diagram or sidebar to explore" : activeZone ? "Hover zone — security coverage below" : "Hover sidebar ↔ diagram"}
            {locked && <span onClick={handleClear} style={{marginLeft:8,color:"#f59e0b",cursor:"pointer",textDecoration:"underline"}}>clear</span>}
          </div>
          {(locked || search) && (
            <div style={{marginTop:4,fontSize:9,color:"#475569",display:"flex",alignItems:"center",gap:4}}>
              <span style={{color:"#64748b",userSelect:"all",fontFamily:"'IBM Plex Mono',monospace",background:"#1e293b",padding:"2px 6px",borderRadius:3,cursor:"text",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                {locked && lockType==="cat" && active ? `#cat=${active}` : locked && lockType==="zone" && activeZone ? `#zone=${activeZone}` : search ? `#q=${search}` : ""}
              </span>
              <span onClick={copyLink} style={{color:linkCopied?"#4ade80":"#64748b",cursor:"pointer",textDecoration:"underline",whiteSpace:"nowrap"}}>{linkCopied?"copied!":"copy link"}</span>
            </div>
          )}
        </div>

        {activeZone && !(locked && lockType==="cat") && (
          <div style={{overflowY:"auto",flex:1}}>
            <div style={{padding:"10px 14px",borderBottom:"1px solid #1e293b"}}>
              <div style={{fontSize:12,color:"#cbd5e1",lineHeight:1.5}}>{zoneDescs[activeZone]}</div>
            </div>
            <div style={{padding:"8px 14px 4px"}}><div style={{fontSize:10,fontWeight:700,color:"#64748b",letterSpacing:"0.1em",textTransform:"uppercase"}}>Protected by ({getItemsForZone(activeZone).length})</div></div>
            {getItemsForZone(activeZone).map(item => {
              const group = categories.find(g=>g.items.some(i=>i.id===item.id));
              return (
                <div key={item.id} onClick={()=>handleCatClick(item.id)} style={{padding:"6px 14px",borderLeft:`3px solid ${zones[activeZone].color}`,cursor:"pointer",transition:"background .15s"}}
                  onMouseEnter={(e)=>e.currentTarget.style.background="#1e293b"}
                  onMouseLeave={(e)=>e.currentTarget.style.background="transparent"}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:12,fontWeight:700,color:"#fbbf24",fontFamily:"'IBM Plex Mono',monospace"}}>{item.label}</span>
                    <span style={{fontSize:10,color:"#94a3b8"}}>{item.full}</span>
                  </div>
                  <div style={{fontSize:11,color:"#94a3b8",lineHeight:1.4,marginTop:2,whiteSpace:"pre-line"}}>{item.desc}</div>
                  {item.commercial && item.commercial.length > 0 && (
                    <div style={{fontSize:9,color:"#64748b",marginTop:3}}>{item.commercial.slice(0,3).map((p,i)=><span key={i} onMouseEnter={(p.share||p.pModel)?(e)=>showSharePop(e,p):undefined} onMouseLeave={(p.share||p.pModel)?startHideSharePop:undefined} style={(p.share||p.pModel)?{cursor:"pointer"}:{}}>{i>0?" · ":""}{p.name}{p.share?<span style={{color:"#f59e0b"}}>{` ${p.share}%`}</span>:""}</span>)}</div>
                  )}
                  {item.free && item.free.length > 0 && (
                    <div style={{fontSize:9,color:"#60a5fa",marginTop:1}}>Free: {item.free.slice(0,2).join(" · ")}</div>
                  )}
                  {item.oss && item.oss.length > 0 && (
                    <div style={{fontSize:9,color:"#4ade80",marginTop:1}}>OSS: {item.oss.slice(0,2).join(" · ")}</div>
                  )}
                  <div style={{fontSize:9,color:"#475569",marginTop:2}}>{group?.group}</div>
                </div>
              );
            })}
          </div>
        )}

        {(!activeZone || (locked && lockType==="cat")) && (
          <div style={{overflowY:"auto",flex:1,display:"flex",flexDirection:"column"}}>
            <div style={{padding:"8px 14px",borderBottom:"1px solid #1e293b",flexShrink:0}}>
              <div style={{position:"relative"}}>
                <input
                  type="text"
                  value={search}
                  onChange={e=>setSearch(e.target.value)}
                  placeholder="Search categories, products..."
                  style={{
                    width:"100%",boxSizing:"border-box",padding:"6px 28px 6px 10px",fontSize:12,
                    background:"#1e293b",border:"1px solid #334155",borderRadius:6,
                    color:"#e2e8f0",outline:"none",fontFamily:"inherit",
                  }}
                  onFocus={e=>e.target.style.borderColor="#f59e0b"}
                  onBlur={e=>e.target.style.borderColor="#334155"}
                />
                {search && <span onClick={()=>setSearch("")} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",cursor:"pointer",color:"#64748b",fontSize:14,lineHeight:1}}>×</span>}
              </div>
              {search && (()=>{
                const q=search.toLowerCase();
                const count=allItems.filter(i=>i.label.toLowerCase().includes(q)||i.full.toLowerCase().includes(q)||i.desc.toLowerCase().includes(q)||(i.commercial||[]).some(p=>p.name.toLowerCase().includes(q))||(i.free||[]).some(p=>p.toLowerCase().includes(q))||(i.oss||[]).some(p=>p.toLowerCase().includes(q))).length;
                return <div style={{fontSize:10,color:"#64748b",marginTop:4}}>{count} result{count!==1?"s":""}</div>;
              })()}
            </div>
            <div style={{overflowY:"auto",flex:1}}>
            {categories.map(group => {
              const q = search.toLowerCase();
              const filteredItems = q ? group.items.filter(item =>
                item.label.toLowerCase().includes(q) ||
                item.full.toLowerCase().includes(q) ||
                item.desc.toLowerCase().includes(q) ||
                (item.commercial||[]).some(p=>p.name.toLowerCase().includes(q)) ||
                (item.free||[]).some(p=>p.toLowerCase().includes(q)) ||
                (item.oss||[]).some(p=>p.toLowerCase().includes(q))
              ) : group.items;
              if (filteredItems.length === 0) return null;
              return (
              <div key={group.group}>
                <div style={{fontSize:9,fontWeight:700,color:group.color||"#64748b",letterSpacing:"0.1em",textTransform:"uppercase",padding:"10px 14px 3px"}}>{group.group}</div>
                {filteredItems.map(item => {
                  const isA = active===item.id;
                  const expanded = isA || !!q;
                  return (
                    <div key={item.id} ref={el => itemRefs.current[item.id] = el} onMouseEnter={()=>handleCatHover(item.id)} onMouseLeave={handleCatLeave} onClick={()=>handleCatClick(item.id)}
                      style={{padding:"5px 14px",cursor:"pointer",background:isA?"#1e293b":hoverItem===item.id?"#151b28":"transparent",borderLeft:isA?"3px solid #f59e0b":hoverItem===item.id?"3px solid #334155":"3px solid transparent",transition:"all .15s"}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontSize:12,fontWeight:700,color:isA?"#fbbf24":"#e2e8f0",fontFamily:"'IBM Plex Mono',monospace"}}>{q ? hl(item.label, q) : item.label}</span>
                        <span style={{fontSize:10,color:"#94a3b8",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{q ? hl(item.full, q) : item.full}</span>
                      </div>
                      {expanded && (
                        <div style={{marginTop:3}}>
                          <div style={{fontSize:11,color:"#cbd5e1",lineHeight:1.4,whiteSpace:"pre-line"}}>{q ? hl(item.desc, q) : item.desc}</div>
                          <div style={{marginTop:4,display:"flex",flexWrap:"wrap",gap:3}}>
                            {item.zones.map(z=><span key={z} style={{fontSize:9,padding:"1px 5px",borderRadius:3,background:zones[z]?.color||"#333",color:"#fff",opacity:0.85}}>{zones[z]?.label||z}</span>)}
                          </div>
                          {item.commercial && item.commercial.length > 0 && (
                            <div style={{marginTop:6}}>
                              <div style={{fontSize:9,fontWeight:700,color:"#64748b",letterSpacing:"0.05em"}}>COMMERCIAL</div>
                              <div style={{fontSize:10,color:"#94a3b8",lineHeight:1.5,marginTop:1}}>{item.commercial.map((p,i)=><span key={i} onMouseEnter={(p.share||p.pModel)?(e)=>showSharePop(e,p):undefined} onMouseLeave={(p.share||p.pModel)?startHideSharePop:undefined} style={(p.share||p.pModel)?{cursor:"pointer"}:{}}>{i>0?" · ":""}{q?hl(p.name,q):p.name}{p.share?<span style={{color:"#f59e0b",fontSize:9,marginLeft:2,textDecoration:"underline",textDecorationStyle:"dotted"}}>{p.share}%</span>:""}</span>)}</div>
                            </div>
                          )}
                          {item.free && item.free.length > 0 && (
                            <div style={{marginTop:4}}>
                              <div style={{fontSize:9,fontWeight:700,color:"#60a5fa",letterSpacing:"0.05em"}}>FREE</div>
                              <div style={{fontSize:10,color:"#93c5fd",lineHeight:1.5,marginTop:1}}>{q ? hlJoin(item.free, q) : item.free.join(" · ")}</div>
                            </div>
                          )}
                          {item.oss && item.oss.length > 0 && (
                            <div style={{marginTop:4}}>
                              <div style={{fontSize:9,fontWeight:700,color:"#4ade80",letterSpacing:"0.05em"}}>OPEN SOURCE</div>
                              <div style={{fontSize:10,color:"#86efac",lineHeight:1.5,marginTop:1}}>{q ? hlJoin(item.oss, q) : item.oss.join(" · ")}</div>
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
              );
            })}
            </div>
          </div>
        )}
      </div>
      {sharePop && (
        <div ref={sharePopRef} onMouseEnter={cancelHideSharePop} onMouseLeave={startHideSharePop} style={{position:"fixed",left:Math.min(sharePop.x, window.innerWidth-280),top:sharePop.y,zIndex:9999,background:"#1e293b",border:"1px solid #475569",borderRadius:6,padding:10,width:260,boxShadow:"0 4px 12px rgba(0,0,0,0.5)"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#e2e8f0",marginBottom:6}}>{sharePop.product.name}</div>
          {sharePop.product.share && <>
            <div style={{fontSize:10,color:"#f59e0b",marginBottom:8}}>Est. {sharePop.product.share}% market share</div>
            <div style={{fontSize:9,color:"#94a3b8",marginBottom:4}}>Sources:</div>
            {sharePop.product.aUrl && (
              <div style={{marginBottom:4}}>
                <a href={sharePop.product.aUrl} target="_blank" rel="noopener" style={{fontSize:10,color:"#60a5fa",textDecoration:"none"}}>
                  {sharePop.product.aPos} — {sharePop.product.aRpt} →
                </a>
              </div>
            )}
            {sharePop.product.fUrl && (
              <div style={{marginBottom:4}}>
                <a href={sharePop.product.fUrl} target="_blank" rel="noopener" style={{fontSize:10,color:"#60a5fa",textDecoration:"none"}}>
                  Revenue: ${sharePop.product.fRev}B — earnings release →
                </a>
              </div>
            )}
          </>}
          {sharePop.product.pModel && (
            <div style={{borderTop:"1px solid #334155",marginTop:6,paddingTop:6}}>
              <div style={{fontSize:9,color:"#94a3b8",marginBottom:3}}>Pricing:</div>
              <div style={{fontSize:10,color:"#e2e8f0"}}>{sharePop.product.pFrom != null ? `From $${sharePop.product.pFrom}/${sharePop.product.pUnit}` : `${sharePop.product.pModel.replace(/_/g,' ')} — contact sales`}</div>
              {sharePop.product.pUrl && <a href={sharePop.product.pUrl} target="_blank" rel="noopener" style={{fontSize:9,color:"#60a5fa",textDecoration:"none"}}>Pricing source →</a>}
            </div>
          )}
          {sharePop.product.share && <div style={{fontSize:8,color:"#475569",marginTop:6}}>Methodology: analyst-position-weighted estimate</div>}
        </div>
      )}
      {typeof BUILD_VERSION !== "undefined" && <div style={{position:"fixed",bottom:4,left:8,fontSize:9,color:"#334155",fontFamily:"'IBM Plex Mono',monospace"}}>{BUILD_VERSION}</div>}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<CyberInfraMap />);
</script>
</body>
</html>
