function CyberInfraMap() {
  // Parse initial state from URL hash
  const parseHash = () => {
    const h = window.location.hash.slice(1);
    const params = new URLSearchParams(h);
    return { cat: params.get("cat"), zone: params.get("zone"), search: params.get("q") || "" };
  };
  const initial = parseHash();

  const [active, setActive] = useState(initial.cat && allItems.find(i=>i.id===initial.cat) ? initial.cat : null);
  const [activeZone, setActiveZone] = useState(initial.zone && zones[initial.zone] ? initial.zone : null);
  const [locked, setLocked] = useState(!!(initial.cat || initial.zone));
  const [lockType, setLockType] = useState(initial.cat ? "cat" : initial.zone ? "zone" : null);
  const [search, setSearch] = useState(initial.search);
  const [hoverItem, setHoverItem] = useState(null);
  const [linkCopied, setLinkCopied] = useState(false);
  const itemRefs = useRef({});

  // Update URL hash when locked state changes
  useEffect(() => {
    try {
      if (locked && lockType === "cat" && active) {
        window.history.replaceState(null, "", `#cat=${active}`);
      } else if (locked && lockType === "zone" && activeZone) {
        window.history.replaceState(null, "", `#zone=${activeZone}`);
      } else if (search) {
        window.history.replaceState(null, "", `#q=${encodeURIComponent(search)}`);
      } else {
        window.history.replaceState(null, "", window.location.pathname || "#");
      }
    } catch(e) { /* sandboxed iframe */ }
  }, [active, activeZone, locked, lockType, search]);

  const copyLink = useCallback(() => {
    let hash = "";
    if (locked && lockType === "cat" && active) hash = `#cat=${active}`;
    else if (locked && lockType === "zone" && activeZone) hash = `#zone=${activeZone}`;
    else if (search) hash = `#q=${encodeURIComponent(search)}`;
    const url = window.location.href.split("#")[0] + hash;
    const el = document.createElement("textarea");
    el.value = url;
    el.style.position = "fixed";
    el.style.opacity = "0";
    document.body.appendChild(el);
    el.select();
    document.execCommand("copy");
    document.body.removeChild(el);
    setLinkCopied(true);
    setTimeout(() => setLinkCopied(false), 2000);
  }, [locked, lockType, active, activeZone, search]);
  
  useEffect(() => {
    if (active && itemRefs.current[active]) {
      itemRefs.current[active].scrollIntoView({ behavior: "smooth", block: "nearest" });
    }
  }, [active]);

  // Share popover state — hover triggered, stays open while mouse is over trigger or popover
  const [sharePop, setSharePop] = useState(null); // {x, y, product}
  const sharePopRef = useRef(null);
  const shareHideTimer = useRef(null);

  const showSharePop = useCallback((e, p) => {

  const startHideSharePop = useCallback(() => {

  // Highlight matching text in search results

    if (!query || !text) return text;

    return <>{text.slice(0, idx)}<mark style={{background:"#f59e0b",color:"#1e1e1e",borderRadius:2,padding:"0 1px"}}>{text.slice(idx, idx + query.length)}</mark>{text.slice(idx + query.length)}</>;
  }, []);

    if (!arr || arr.length === 0) return null;

  const handleCatLeave = useCallback(() => { setHoverItem(null); if (!locked) setActive(null); }, [locked]);

    if (active === id && locked && lockType === "cat") { setLocked(false); setLockType(null); setActive(null); }
    else { setActive(id); setActiveZone(null); setLocked(true); setLockType("cat"); setSearch(""); }

        )}

        {(!activeZone || (locked && lockType==="cat")) && (
          <div style={{overflowY:"auto",flex:1,display:"flex",flexDirection:"column"}}>
            <div style={{padding:"8px 14px",borderBottom:"1px solid #1e293b",flexShrink:0}}>
              <div style={{position:"relative"}}>
                <input
                  type="text"
                  value={search}
                  onChange={e=>setSearch(e.target.value)}
                  placeholder="Search categories, products..."
                  style={{
                    width:"100%",boxSizing:"border-box",padding:"6px 28px 6px 10px",fontSize:12,
                    background:"#1e293b",border:"1px solid #334155",borderRadius:6,
                    color:"#e2e8f0",outline:"none",fontFamily:"inherit",
                  }}
                  onFocus={e=>e.target.style.borderColor="#f59e0b"}
                  onBlur={e=>e.target.style.borderColor="#334155"}
                />
                {search && <span onClick={()=>setSearch("")} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",cursor:"pointer",color:"#64748b",fontSize:14,lineHeight:1}}>×</span>}
              </div>
              {search && (()=>{
                const q=search.toLowerCase();
                const count=allItems.filter(i=>i.label.toLowerCase().includes(q)||i.full.toLowerCase().includes(q)||i.desc.toLowerCase().includes(q)||(i.commercial||[]).some(p=>p.name.toLowerCase().includes(q))||(i.free||[]).some(p=>p.toLowerCase().includes(q))||(i.oss||[]).some(p=>p.toLowerCase().includes(q))).length;
                return <div style={{fontSize:10,color:"#64748b",marginTop:4}}>{count} result{count!==1?"s":""}</div>;
              })()}
            </div>
            <div style={{overflowY:"auto",flex:1}}>
            {categories.map(group => {
              const q = search.toLowerCase();
              const filteredItems = q ? group.items.filter(item =>
                item.label.toLowerCase().includes(q) ||
                item.full.toLowerCase().includes(q) ||
                item.desc.toLowerCase().includes(q) ||
                (item.commercial||[]).some(p=>p.name.toLowerCase().includes(q)) ||
                (item.free||[]).some(p=>p.toLowerCase().includes(q)) ||
                (item.oss||[]).some(p=>p.toLowerCase().includes(q))
              ) : group.items;
              if (filteredItems.length === 0) return null;
              return (
              <div key={group.group}>
                <div style={{fontSize:9,fontWeight:700,color:group.color||"#64748b",letterSpacing:"0.1em",textTransform:"uppercase",padding:"10px 14px 3px"}}>{group.group}</div>
                {filteredItems.map(item => {
                  const isA = active===item.id;
                  const expanded = isA || !!q;
                  return (
                    <div key={item.id} ref={el => itemRefs.current[item.id] = el} onMouseEnter={()=>handleCatHover(item.id)} onMouseLeave={handleCatLeave} onClick={()=>handleCatClick(item.id)}
                      style={{padding:"5px 14px",cursor:"pointer",background:isA?"#1e293b":hoverItem===item.id?"#151b28":"transparent",borderLeft:isA?"3px solid #f59e0b":hoverItem===item.id?"3px solid #334155":"3px solid transparent",transition:"all .15s"}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontSize:12,fontWeight:700,color:isA?"#fbbf24":"#e2e8f0",fontFamily:"'IBM Plex Mono',monospace"}}>{q ? hl(item.label, q) : item.label}</span>
                        <span style={{fontSize:10,color:"#94a3b8",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{q ? hl(item.full, q) : item.full}</span>
                      </div>
                      {expanded && (
                        <div style={{marginTop:3}}>
                          <div style={{fontSize:11,color:"#cbd5e1",lineHeight:1.4,whiteSpace:"pre-line"}}>{q ? hl(item.desc, q) : item.desc}</div>
                          <div style={{marginTop:4,display:"flex",flexWrap:"wrap",gap:3}}>
                            {item.zones.map(z=><span key={z} style={{fontSize:9,padding:"1px 5px",borderRadius:3,background:zones[z]?.color||"#333",color:"#fff",opacity:0.85}}>{zones[z]?.label||z}</span>)}
                          </div>
                          {item.levels && (item.levels.typical || (item.levels.fix && item.levels.fix.length > 0)) && (
                            <div style={{marginTop:4,display:"flex",alignItems:"center",flexWrap:"wrap",gap:3}}>
                              <span style={{fontSize:9,fontWeight:700,color:"#64748b",letterSpacing:"0.05em",marginRight:2}}>ACT</span>
                              {item.levels.typical && <span title={LEVEL_TITLES[item.levels.typical]||item.levels.typical} style={{fontSize:9,padding:"1px 5px",borderRadius:3,background:LEVEL_COLORS[item.levels.typical]||"#555",color:"#fff",opacity:0.9,fontFamily:"'IBM Plex Mono',monospace",fontWeight:700}}>{item.levels.typical}</span>}
                              {item.levels.fix && item.levels.fix.filter(f=>f!==item.levels.typical).map(f=><span key={f} title={LEVEL_TITLES[f]||f} style={{fontSize:9,padding:"1px 5px",borderRadius:3,background:LEVEL_COLORS[f]||"#555",color:"#fff",opacity:0.65,fontFamily:"'IBM Plex Mono',monospace",border:"1px dashed #475569"}}>{f}</span>)}
                            </div>
                          )}
                          {item.commercial && item.commercial.length > 0 && (
                            <div style={{marginTop:6}}>
                              <div style={{fontSize:9,fontWeight:700,color:"#64748b",letterSpacing:"0.05em"}}>COMMERCIAL</div>
                              <div style={{fontSize:10,color:"#94a3b8",lineHeight:1.5,marginTop:1}}>{item.commercial.map((p,i)=><span key={i} onMouseEnter={(p.share||p.pModel)?(e)=>showSharePop(e,p):undefined} onMouseLeave={(p.share||p.pModel)?startHideSharePop:undefined} style={(p.share||p.pModel)?{cursor:"pointer"}:{}}>{i>0?" · ":""}{q?hl(p.name,q):p.name}{p.share?<span style={{color:"#f59e0b",fontSize:9,marginLeft:2,textDecoration:"underline",textDecorationStyle:"dotted"}}>{p.share}%</span>:""}</span>)}</div>
                            </div>
                          )}
                          {item.free && item.free.length > 0 && (
                            <div style={{marginTop:4}}>
                              <div style={{fontSize:9,fontWeight:700,color:"#60a5fa",letterSpacing:"0.05em"}}>FREE</div>
                              <div style={{fontSize:10,color:"#93c5fd",lineHeight:1.5,marginTop:1}}>{q ? hlJoin(item.free, q) : item.free.join(" · ")}</div>
                            </div>
                          )}
                          {item.oss && item.oss.length > 0 && (
                            <div style={{marginTop:4}}>
                              <div style={{fontSize:9,fontWeight:700,color:"#4ade80",letterSpacing:"0.05em"}}>OPEN SOURCE</div>
                              <div style={{fontSize:10,color:"#86efac",lineHeight:1.5,marginTop:1}}>{q ? hlJoin(item.oss, q) : item.oss.join(" · ")}</div>
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
              );
            })}
            </div>
          </div>
        )}
      </div>
      {sharePop && (
        <div ref={sharePopRef} onMouseEnter={cancelHideSharePop} onMouseLeave={startHideSharePop} style={{position:"fixed",left:Math.min(sharePop.x, window.innerWidth-280),top:sharePop.y,zIndex:9999,background:"#1e293b",border:"1px solid #475569",borderRadius:6,padding:10,width:260,boxShadow:"0 4px 12px rgba(0,0,0,0.5)"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#e2e8f0",marginBottom:6}}>{sharePop.product.name}</div>
          {sharePop.product.share && <>
            <div style={{fontSize:10,color:"#f59e0b",marginBottom:8}}>Est. {sharePop.product.share}% market share</div>
            <div style={{fontSize:9,color:"#94a3b8",marginBottom:4}}>Sources:</div>
            {sharePop.product.aUrl && (
              <div style={{marginBottom:4}}>
                <a href={sharePop.product.aUrl} target="_blank" rel="noopener" style={{fontSize:10,color:"#60a5fa",textDecoration:"none"}}>
                  {sharePop.product.aPos} — {sharePop.product.aRpt} →
                </a>
              </div>
            )}
            {sharePop.product.fUrl && (
              <div style={{marginBottom:4}}>
                <a href={sharePop.product.fUrl} target="_blank" rel="noopener" style={{fontSize:10,color:"#60a5fa",textDecoration:"none"}}>
                  Revenue: ${sharePop.product.fRev}B — earnings release →
                </a>
              </div>
            )}
          </>}
          {sharePop.product.pModel && (
            <div style={{borderTop:"1px solid #334155",marginTop:6,paddingTop:6}}>
              <div style={{fontSize:9,color:"#94a3b8",marginBottom:3}}>Pricing:</div>
              <div style={{fontSize:10,color:"#e2e8f0"}}>{sharePop.product.pFrom != null ? `From $${sharePop.product.pFrom}/${sharePop.product.pUnit}` : `${sharePop.product.pModel.replace(/_/g,' ')} — contact sales`}</div>
              {sharePop.product.pUrl && <a href={sharePop.product.pUrl} target="_blank" rel="noopener" style={{fontSize:9,color:"#60a5fa",textDecoration:"none"}}>Pricing source →</a>}
            </div>
          )}
          {sharePop.product.share && <div style={{borderTop:"1px solid #334155",marginTop:6,paddingTop:4}}>
            <div style={{fontSize:8,color:"#64748b",fontFamily:"'IBM Plex Mono',monospace",lineHeight:"1.4",wordBreak:"break-word"}}>{sharePop.product.sNote || "Methodology: analyst-position-weighted estimate"}</div>
          </div>}
        </div>
      )}
      {typeof BUILD_VERSION !== "undefined" && <div style={{position:"fixed",bottom:4,left:8,fontSize:9,color:"#94a3b8",fontFamily:"'IBM Plex Mono',monospace"}}>{BUILD_VERSION}</div>}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<CyberInfraMap />);
</script>
</body>
</html>
